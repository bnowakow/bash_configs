# Logrotate configuration for PVC backup script logs
/home/sup/code/bash_configs/rancher/helm-pvc-storage-backups/logs/backup-*.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0644 root root
    sharedscripts
    postrotate
        # Optional: add any commands to run after rotation
        # For example, send notification: logger "PVC backup logs rotated"
    endscript
}
